name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'prisma/**'
      - 'public/**'
      - 'shared/**'
      - 'services/worker/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'Dockerfile'
      - 'fly.toml'
      - 'shopify.app.toml'
      - 'shopify.web.toml'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
